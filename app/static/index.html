<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversation Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-card: #16213e;
            --bg-input: #1a1a2e;
            --accent-primary: #6c63ff;
            --accent-secondary: #e94560;
            --accent-glow: rgba(108, 99, 255, 0.3);
            --text-primary: #e8e8f0;
            --text-secondary: #a0a0b8;
            --text-muted: #6b6b80;
            --border-color: rgba(108, 99, 255, 0.2);
            --success: #00d2a0;
            --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ── */
        .header {
            background: linear-gradient(135deg, var(--bg-secondary), var(--bg-card));
            border-bottom: 1px solid var(--border-color);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            backdrop-filter: blur(10px);
        }

        .header-icon {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .header-text h1 {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, var(--text-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-text p {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .status-badge {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--success);
            font-weight: 500;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                box-shadow: 0 0 0 0 rgba(0, 210, 160, 0.4);
            }

            50% {
                opacity: 0.8;
                box-shadow: 0 0 0 6px rgba(0, 210, 160, 0);
            }
        }

        /* ── Chat Area ── */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
        }

        .welcome-card {
            text-align: center;
            padding: 48px 24px;
            animation: fadeIn 0.6s ease;
        }

        .welcome-card .emoji {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .welcome-card h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .welcome-card p {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.6;
            max-width: 500px;
            margin: 0 auto 24px;
        }

        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .suggestion-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 10px 16px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.25s ease;
        }

        .suggestion-btn:hover {
            border-color: var(--accent-primary);
            color: var(--accent-primary);
            background: rgba(108, 99, 255, 0.08);
            transform: translateY(-1px);
        }

        /* ── Messages ── */
        .message {
            display: flex;
            gap: 12px;
            animation: slideUp 0.35s ease;
            max-width: 100%;
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background: linear-gradient(135deg, var(--accent-secondary), #ff6b6b);
        }

        .message.assistant .message-avatar {
            background: linear-gradient(135deg, var(--accent-primary), #4ecdc4);
        }

        .message-bubble {
            padding: 14px 18px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.65;
            max-width: 75%;
            word-wrap: break-word;
        }

        .message.user .message-bubble {
            background: linear-gradient(135deg, var(--accent-primary), #5a52d5);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-bubble {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
        }

        /* ── Typing Indicator ── */
        .typing-indicator {
            display: flex;
            gap: 12px;
            animation: slideUp 0.35s ease;
        }

        .typing-dots {
            display: flex;
            gap: 5px;
            padding: 18px 22px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            border-bottom-left-radius: 4px;
        }

        .typing-dots span {
            width: 8px;
            height: 8px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing-dots span:nth-child(1) {
            animation-delay: 0s;
        }

        .typing-dots span:nth-child(2) {
            animation-delay: 0.16s;
        }

        .typing-dots span:nth-child(3) {
            animation-delay: 0.32s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: scale(0.6);
                opacity: 0.4;
            }

            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        /* ── Input Area ── */
        .input-area {
            padding: 16px 24px 20px;
            border-top: 1px solid var(--border-color);
            background: var(--bg-secondary);
        }

        .input-wrapper {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .input-wrapper input {
            flex: 1;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 14px 18px;
            border-radius: 14px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.25s, box-shadow 0.25s;
        }

        .input-wrapper input:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .input-wrapper input::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--accent-primary), #5a52d5);
            border: none;
            border-radius: 14px;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s;
            flex-shrink: 0;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 20px var(--accent-glow);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* ── Error Toast ── */
        .error-toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent-secondary);
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 13px;
            z-index: 999;
            animation: fadeIn 0.3s ease;
            box-shadow: var(--shadow-lg);
        }

        /* ── Scrollbar ── */
        .chat-container::-webkit-scrollbar {
            width: 6px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        .chat-container::-webkit-scrollbar-thumb:hover {
            background: var(--accent-primary);
        }
    </style>
</head>

<body>
    <!-- Header -->
    <div class="header">
        <div class="header-icon">🧠</div>
        <div class="header-text">
            <h1>Conversation Intelligence</h1>
            <p>AI-powered chat analysis &amp; persona insights</p>
        </div>
        <div class="status-badge" id="statusBadge">
            <div class="status-dot"></div>
            <span>Online</span>
        </div>
    </div>

    <!-- Chat Area -->
    <div class="chat-container" id="chatContainer">
        <div class="welcome-card" id="welcomeCard">
            <div class="emoji">💬</div>
            <h2>Ask anything about the conversation</h2>
            <p>I've analyzed the conversation history and built a user persona. Ask about topics, personality traits,
                habits, or anything else!</p>
            <div class="suggestions">
                <button class="suggestion-btn" onclick="askSuggestion(this)">What kind of person is this user?</button>
                <button class="suggestion-btn" onclick="askSuggestion(this)">What topics were discussed?</button>
                <button class="suggestion-btn" onclick="askSuggestion(this)">What are the user's hobbies?</button>
                <button class="suggestion-btn" onclick="askSuggestion(this)">Summarize the conversations</button>
            </div>
        </div>
    </div>

    <!-- Input Area -->
    <div class="input-area">
        <div class="input-wrapper">
            <input type="text" id="chatInput"
                placeholder="Ask about the user's persona, topics, or conversation details..."
                onkeydown="if(event.key==='Enter') sendMessage()">
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const welcomeCard = document.getElementById('welcomeCard');
        let isProcessing = false;

        function askSuggestion(btn) {
            chatInput.value = btn.textContent;
            sendMessage();
        }

        function addMessage(role, text) {
            if (welcomeCard) welcomeCard.style.display = 'none';

            const div = document.createElement('div');
            div.className = `message ${role}`;

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = role === 'user' ? '👤' : '🤖';

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.textContent = text;

            div.appendChild(avatar);
            div.appendChild(bubble);
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function showTyping() {
            const div = document.createElement('div');
            div.className = 'typing-indicator';
            div.id = 'typingIndicator';

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.style.background = 'linear-gradient(135deg, var(--accent-primary), #4ecdc4)';
            avatar.textContent = '🤖';

            const dots = document.createElement('div');
            dots.className = 'typing-dots';
            dots.innerHTML = '<span></span><span></span><span></span>';

            div.appendChild(avatar);
            div.appendChild(dots);
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function hideTyping() {
            const el = document.getElementById('typingIndicator');
            if (el) el.remove();
        }

        function showError(msg) {
            const toast = document.createElement('div');
            toast.className = 'error-toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        async function sendMessage() {
            const text = chatInput.value.trim();
            if (!text || isProcessing) return;

            isProcessing = true;
            sendBtn.disabled = true;
            chatInput.value = '';

            addMessage('user', text);
            showTyping();

            try {
                const resp = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: text })
                });

                hideTyping();

                if (!resp.ok) {
                    const err = await resp.json();
                    showError(err.error || 'Server error');
                    return;
                }

                const data = await resp.json();
                addMessage('assistant', data.answer);
            } catch (e) {
                hideTyping();
                showError('Connection failed. Is the server running?');
            } finally {
                isProcessing = false;
                sendBtn.disabled = false;
                chatInput.focus();
            }
        }

        // Health check on load
        fetch('/api/health')
            .then(r => r.json())
            .then(d => {
                document.getElementById('statusBadge').querySelector('span').textContent = 'Online — ' + d.model;
            })
            .catch(() => {
                const badge = document.getElementById('statusBadge');
                badge.querySelector('.status-dot').style.background = 'var(--accent-secondary)';
                badge.querySelector('span').textContent = 'Offline';
                badge.style.color = 'var(--accent-secondary)';
            });

        chatInput.focus();
    </script>
</body>

</html>
